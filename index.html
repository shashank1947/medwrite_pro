<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedWrite Pro</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .auth-panel {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 8px 16px;
            background: #2a2a2a;
            border: none;
            color: #888;
            border-radius: 20px;
            cursor: pointer;
        }
        .tab.active {
            background: #0071e3;
            color: white;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 12px;
            color: #888;
        }
        input[type="text"] {
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }
        .workspace {
            display: flex;
            gap: 20px;
        }
        .canvas-area, .result-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        canvas {
            background: white;
            border-radius: 8px;
            cursor: crosshair;
        }
        .btn-container {
            display: flex;
            gap: 10px;
        }
        button.action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary { background: #0071e3; color: white; }
        .btn-secondary { background: #2c2c2e; color: white; }
        .well {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            min-height: 250px;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
</head>
<body>

    <div class="auth-panel">
        <div class="tabs">
            <button id="tab-indiv" class="tab" onclick="switchAuthMode('individual')">Individual Clinician</button>
            <button id="tab-org" class="tab active" onclick="switchAuthMode('organisation')">Hospital / Clinic Network</button>
        </div>
        <div class="input-group">
            <label id="auth-label">Active Medical Facility/Identity Identifier</label>
            <input type="text" id="auth-user" value="HOSPITAL" placeholder="Organisation Code / Email">
        </div>
    </div>

    <div class="workspace">
        <div class="canvas-area">
            <label>Prescription / Clinical Notes Digital Drawing Surface</label>
            <canvas id="a4-canvas" width="400" height="300"></canvas>
            <div class="btn-container">
                <button class="action-btn btn-secondary" onclick="clearCanvasPad()">Clear Canvas</button>
                <button class="action-btn btn-primary" onclick="runPrescriptionOptimizationAI()">Optimize AI ✨</button>
            </div>
        </div>

        <div class="result-area">
            <label>Extracted Medical Insights & Structured Output</label>
            <div id="a4-text-well" class="well">
                Awaiting prescription stroke parsing... Click "Optimize AI" to trigger Gemini interpretation.
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('a4-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Reset canvas background to white
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000000';

    canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });

    function draw(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function clearCanvasPad() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        document.getElementById('a4-text-well').innerHTML = 'Awaiting prescription stroke parsing... Click "Optimize AI" to trigger Gemini interpretation.';
    }

    function switchAuthMode(mode) {
        document.getElementById('tab-indiv').classList.remove('active');
        document.getElementById('tab-org').classList.remove('active');
        
        if (mode === 'individual') {
            document.getElementById('tab-indiv').classList.add('active');
            document.getElementById('auth-user').placeholder = "Username / Access Email";
            document.getElementById('auth-user').value = "";
        } else {
            document.getElementById('tab-org').classList.add('active');
            document.getElementById('auth-user').placeholder = "Organisation Code / Email";
            document.getElementById('auth-user').value = "HOSPITAL"; // Kept as HOSPITAL here too
        }
    }

    function mirrorHandwritingToA4Well() {
        // Keeps your original system architecture requirements intact
    }

    async function runPrescriptionOptimizationAI() {
        mirrorHandwritingToA4Well(); 
        const well = document.getElementById('a4-text-well'); 
        well.innerHTML = 'Parsing data payload streams...';
        
        try {
            const response = await fetch('https://medwrite-pro.onrender.com/optimize-prescription', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ image: canvas.toDataURL('image/png') }) 
            });
            
            const data = await response.json();
            
            if (response.ok) {
                well.innerHTML = `
                    <div><strong>📌 Medication:</strong> ${data.medication || 'Not detected'}</div>
                    <div><strong>⚖️ Dosage:</strong> ${data.dosage || 'Not specified'}</div>
                    <div><strong>⏳ Duration:</strong> ${data.duration || 'Not specified'}</div>
                    <div style="margin-top:10px;"><strong>📝 Instructions:</strong> ${data.instructions || 'As directed.'}</div>
                `;
            } else {
                well.innerHTML = 'Error running optimization.';
            }
        } catch(e) {
            well.innerHTML = 'Error running optimization.';
        }
    }
</script>
</body>
</html>
