<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedWrite Pro - Smart AI Prescription Assistant</title>
    <style>
        :root {
            --primary: #0071e3;
            --primary-dark: #005bb5;
            --bg-dark: #121212;
            --surface-dark: #1e1e1e;
            --border-dark: #333333;
            --text-light: #f5f5f7;
            --text-muted: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface-dark);
            border: 1px solid var(--border-dark);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .auth-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-dark);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tab {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border-dark);
            color: var(--text-muted);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        .canvas-area, .result-area {
            display: flex;
            flex-direction: column;
        }

        canvas {
            background: white;
            border-radius: 8px;
            cursor: crosshair;
            width: 100%;
            height: 300px;
            touch-action: none;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button.action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #2c2c2e;
            color: var(--text-light);
            border: 1px solid var(--border-dark);
        }

        .btn-secondary:hover {
            background: #3a3a3c;
        }

        .well {
            background: #151515;
            border: 1px solid var(--border-dark);
            border-radius: 8px;
            padding: 16px;
            flex: 1;
            min-height: 300px;
            font-size: 14px;
            line-height: 1.6;
            overflow-y: auto;
        }

        .output-box {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #222;
        }

        .output-box strong {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MedWrite Pro</h1>
    <div class="subtitle">Clinical AI Document Management Portal</div>

    <div class="auth-panel">
        <div class="tabs">
            <button id="tab-indiv" class="tab" onclick="switchAuthMode('individual')">Individual Clinician</button>
            <button id="tab-org" class="tab active" onclick="switchAuthMode('organisation')">Hospital / Clinic Network</button>
        </div>
        <div class="input-group">
            <label id="auth-label">Active Medical Facility/Identity Identifier</label>
            <input type="text" id="auth-user" value="HOSPITAL" placeholder="Organisation Code / Email">
        </div>
    </div>

    <div class="workspace">
        <div class="canvas-area">
            <label>Prescription / Clinical Notes Digital Drawing Surface</label>
            <canvas id="a4-canvas"></canvas>
            <div class="btn-container">
                <button class="action-btn btn-secondary" onclick="clearCanvasPad()">Clear Canvas</button>
                <button class="action-btn btn-primary" onclick="runPrescriptionOptimizationAI()">Optimize AI ✨</button>
            </div>
        </div>

        <div class="result-area">
            <label>Extracted Medical Insights & Structured Output</label>
            <div id="a4-text-well" class="well">
                <span style="color: var(--text-muted);">Awaiting prescription stroke parsing... Click "Optimize AI" to trigger Gemini interpretation.</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Drawing Pad Configuration
    const canvas = document.getElementById('a4-canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // Resize canvas bounding rect correctly for DPI
    function resizeCanvasMatrix() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = 300;
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#121212';
    }
    window.addEventListener('resize', resizeCanvasMatrix);
    resizeCanvasMatrix();

    // Canvas Event Listeners for Writing Dynamics
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; drawStroke(e); });
    canvas.addEventListener('mousemove', drawStroke);
    canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
    canvas.addEventListener('mouseout', () => { isDrawing = false; ctx.beginPath(); });

    // Touch support for mobile devices
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; drawStroke(e.touches[0]); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { drawStroke(e.touches[0]); e.preventDefault(); });
    canvas.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });

    function drawStroke(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.pageX) - rect.left;
        const y = (e.clientY || e.pageY) - rect.top;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function clearCanvasPad() {
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        document.getElementById('a4-text-well').innerHTML = '<span style="color: var(--text-muted);">Awaiting prescription stroke parsing... Click "Optimize AI" to trigger Gemini interpretation.</span>';
    }

    // Toggle authentication contextual labels
    function switchAuthMode(mode) {
        document.getElementById('tab-indiv').classList.remove('active');
        document.getElementById('tab-org').classList.remove('active');
        
        if (mode === 'individual') {
            document.getElementById('tab-indiv').classList.add('active');
            document.getElementById('auth-user').placeholder = "Username / Access Email";
            document.getElementById('auth-user').value = "";
        } else {
            document.getElementById('tab-org').classList.add('active');
            document.getElementById('auth-user').placeholder = "Organisation Code / Email";
            document.getElementById('auth-user').value = "HOSPITAL";
        }
    }

    // Process Canvas Base64 Streams and call backend pipelines
    async function runPrescriptionOptimizationAI() {
        const well = document.getElementById('a4-text-well');
        well.innerHTML = '<span style="color: #0071e3;">Parsing data payload streams and contacting cloud AI engines...</span>';
        
        try {
            // Pack canvas bytes directly to high-density base64 image strings
            const dataUrlPayload = canvas.toDataURL('image/png');

            // Production Render target deployment address
            const response = await fetch('https://medwrite-pro.onrender.com/optimize-prescription', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: dataUrlPayload })
            });

            const data = await response.json();

            if (response.ok) {
                well.innerHTML = `
                    <div class="output-box"><strong>📌 Medication:</strong> ${data.medication || 'Not detected'}</div>
                    <div class="output-box"><strong>⚖️ Dosage:</strong> ${data.dosage || 'Not specified'}</div>
                    <div class="output-box"><strong>⏳ Duration:</strong> ${data.duration || 'Not specified'}</div>
                    <div class="output-box"><strong>📝 Instructions:</strong> ${data.instructions || 'As directed.'}</div>
                `;
            } else {
                well.innerHTML = `<span style="color: #ff453a;">System Node Error: ${data.error || 'Failed to analyze imagery environment.'}</span>`;
            }
        } catch (err) {
            well.innerHTML = `<span style="color: #ff453a;">Network Route Interrupted: Could not reach the remote Render microservice container. Ensure the backend instance isn't sleeping.</span>`;
            console.error("Pipeline failure:", err);
        }
    }
</script>

</body>
</html>
